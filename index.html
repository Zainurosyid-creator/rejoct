<!DOCTYPE html>
<html lang="id">
  <head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #1f2937;
    color: white;
    font-family: Arial, sans-serif;
  }

  nav {
    background: #888;
    width: 100%;
    padding: 0px 32px;
    display: flex;
    justify-content: space-between; /* Logo kiri, hamburger kanan */
    align-items: center; /* ini yang bener */
    height: 72px;
  }


  .navbar {
    position: relative;
  }

  .hamburger {
    font-size: 28px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
    padding: 0;
    margin: 0;
  }

  .menu {
    display: none;
    flex-direction: column;
    background: #444;
    position: absolute;
    top: 100%;
    right: 0;
    width: 180px;
    border-radius: 8px;
    overflow: hidden;
    margin-top: 8px;
  }

  .menu.show {
    display: flex;
  }

  .menu a {
    color: #fff;
    text-decoration: none;
    padding: 12px 16px;
    border-bottom: 1px solid #555;
  }

  .menu a:hover {
    background: #555;
  }
        .logo {
        margin: left;
        margin-left: auto;
        width: 128px;
        height: 90px;
        object-fit: cover;
      }
  .container {
    padding: 32px;
  }

  .footer {
    display: flex;
    justify-content: center;
    color: #666;
    margin-top: 50px;
  }
</style>
  </head>
  <body>
    <nav>
      <div class="nav-logo">
        <img src="https://www.webmaster-tipps.de/wp-content/uploads/html5-einsteigerguide.png" class="logo">
      </div>
    <div class="navbar">
      <button class="hamburger" onclick="toggleMenu()">☰</button>
      <div class="menu" id="menu">
        <a href="music.html">Music</a>
        <a href="about.html">About</a>
        <a href="#service">Service</a>
        <a href="#contact">Contact</a>
      </div>
    </div>
    <script>
      function toggleMenu() {
      document.getElementById("menu").classList.toggle("show");
      }
    </script>
      
    </nav>
    <div class="container">
     
    </div>
    <div class="footer">© 2026 Rezzaw</div>
  </body>
</html>
