<!DOCTYPE html>
<html lang="id">
  <head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <title>EKG-JG</title>
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/3/38/HTML5_Badge.svg/3840px-HTML5_Badge.svg.png">
    <style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #1f2937;
    color: white;
    font-family: Arial, sans-serif;
  }

  nav {
    background: #888;
    width: 100%;
    padding: 0px 32px;
    display: flex;
    justify-content: space-between; /* Logo kiri, hamburger kanan */
    align-items: center; /* ini yang bener */
    height: 72px;
  }


  .navbar {
    position: relative;
  }

  .hamburger {
    font-size: 28px;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
    padding: 0;
    margin: 0;
  }

  .menu {
    display: none;
    flex-direction: column;
    background: #444;
    position: absolute;
    top: 100%;
    right: 0;
    width: 180px;
    border-radius: 8px;
    overflow: hidden;
    margin-top: 8px;
  }

  .menu.show {
    display: flex;
  }

  .menu a {
    color: #fff;
    text-decoration: none;
    padding: 12px 16px;
    border-bottom: 1px solid #555;
  }

  .menu a:hover {
    background: #555;
  }
        .logo {
        margin: left;
        margin-left: auto;
        width: 128px;
        height: 85px;
        object-fit: cover;
      }
  .container {
    padding: 32px;
  }

  .footer {
    display: flex;
    justify-content: center;
    color: #666;
    margin-top: 50px;
  }
  .dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 40px 20px;
    max-width: 1000px;
    margin: auto;
  }
  .card {
    background: #2a2f3f;
    border-radius: 12px;
    padding: 20px;
    text-align: left;
    border: 1px solid #3a3f50;
  }
  .card h3 {
    margin: 0 0 10px 0;
    font-size: 14px;
    color: #aaa;
  }
  .card p {
    margin: 0;
    font-size: 22px;
    font-weight: bold;
    color: #fff;
  }
  .status-online { color: #4ade80; }
  .status-offline { color: #f87171; }
</style>
  </head>
  <body>
    <nav>
      <div class="nav-logo">
        <img src="https://www.webmaster-tipps.de/wp-content/uploads/html5-einsteigerguide.png" class="logo">
      </div>
    <div class="navbar">
      <button class="hamburger" onclick="toggleMenu()">☰</button>
      <div class="menu" id="menu">
        <a href="music.html">Music</a>
        <a href="speedtest.html">Speed Test</a>
        <a href="about.html">About</a>
        <a href="#service">Service</a>
      </div>
    </div>
    <div class="dashboard">
  <div class="card">
    <h3>IP PUBLIK</h3>
    <p id="ip">Loading...</p>
  </div>
  <div class="card">
    <h3>ISP</h3>
    <p id="isp">Loading...</p>
  </div>
  <div class="card">
    <h3>PING KE CLOUDFLARE</h3>
    <p id="ping">Testing...</p>
  </div>
  <div class="card">
    <h3>STATUS SERVER HOME</h3>
    <p id="server" class="status-online">Online</p>
  </div>
</div>
    <script>
      function toggleMenu() {
      document.getElementById("menu").classList.toggle("show");
      }
      fetch('https://ipapi.co/json/')
.then(res => res.json())
.then(data => {
  document.getElementById('ip').innerText = data.ip;
  document.getElementById('isp').innerText = data.org;
  document.getElementById('city').innerText = data.city;
})
      let start = Date.now();
fetch('https://1.1.1.1', {mode: 'no-cors'})
.then(() => {
  let ping = Date.now() - start;
  document.getElementById('ping').innerText = ping + 'ms';
})
// 1. DAPETIN IP + ISP
fetch('https://ipapi.co/json/')
.then(res => res.json())
.then(data => {
  document.getElementById('ip').innerText = data.ip;
  document.getElementById('isp').innerText = data.org;
})
.catch(() => {
  document.getElementById('ip').innerText = 'Gagal';
  document.getElementById('isp').innerText = 'Gagal';
});

// 2. TEST PING
let start = Date.now();
fetch('https://1.1.1.1', {mode: 'no-cors'})
.then(() => {
  let ping = Date.now() - start;
  document.getElementById('ping').innerText = ping + ' ms';
    if(ping < 50) document.getElementById('ping').style.color = '#4ade80';
  })
  .catch(() => {
    document.getElementById('ping').innerText = 'Timeout';
  });
  
  // 3. STATUS SERVER HOME - GANTI IP NYA SESUAI SERVER LU
  fetch('http://192.168.1.10') // ganti ini ke IP server home lu
  .then(() => {
    document.getElementById('server').innerText = 'Online';
  })
  .catch(() => {
    document.getElementById('server').innerText = 'Offline';
    document.getElementById('server').className = 'status-offline';
  });
    </script>
      
    </nav>
    <div class="container">
     
    </div>
    <div class="footer">© 2026 Rezzaw</div>
  </body>
</html>
