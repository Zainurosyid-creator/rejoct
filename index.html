<!DOCTYPE html>
<html lang="id">
  <head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #1f2937;
        color: white;
        font-size: 30px;
        font-family: Arial, sans-serif;
        padding: 0px;
        margin: 0px;
      }
      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin: right;
        margin-right: auto;
        color: white;
        padding: 12px 20px;
        
      }
      .hamburger {
        font-size: 28px;
        justify-content: space-between;
        background: none;
        border: none;
        color: white;
        cursor: pointer;
        display: block;
        padding: 0;
        margin: 0;
      }
      .menu {
        display: none;
        flex-direction: column;
        background: #444;
        position: absolute;
        top: 60px;
        right: 20px;
        width: 180px;
        border-radius: 8px;
        overflow: hidden;
      }
      .menu a:hover {
        background: #555;
      }
      .menu.show {
        display: flex;
      }
      nav {
        background: #888;
        width: 100%;
        padding:0px 32px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 72px;
        gap: 0px;
      }
      .nav-logo {
        color: #fff;
        font-size: 24px;
       }
      nav a {
        color: #fff;
        text-decoration: none;
        font-weight: bold;
        text-align: right;
      }
      .logo {
        margin: left;
        margin-left: auto;
        width: 128px;
        height: 75px;
        object-fit: cover;
      }
      .container {
        padding: 32px;
      }
      h1 {
        color: #4da6ff;
        margin-bottom: 10px;
      }
      p {
        color: #ccc;           
      }
      .footer {
        display: flex;
        justify-content: center;
        color: #666;
        margin-top: 50px;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="nav-logo">
        <img src="https://www.webmaster-tipps.de/wp-content/uploads/html5-einsteigerguide.png" class="logo">
      </div>
    <div class="navbar">
      <button class="hamburger" onclick="toggleMenu()">☰</button>
      <div class="menu" id="menu">
        <a href="music.html">Music</a>
        <a href="about.html">About</a>
        <a href="#service">Service</a>
        <a href="#contact">Contact</a>
      </div>
    </div>
    <script>
      function toggleMenu() {
      document.getElementById("menu").classList.toggle("show");
      }
    </script>
      
    </nav>
    <div class="container">
     
    </div>
    <div class="footer">© 2026 Rezzaw</div>
  </body>
</html>
