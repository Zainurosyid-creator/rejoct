<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8">
    <title>music</title>
    <style>
      * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
      }
      body { 
        background: #1f2937;
        color: white;
        font-size: 30px;
        font-family: Arial, sans-serif;
        padding: 0px;
        margin: 0px;
      }
      nav {
        background: #888;
        width: 100%;
        font-size: 30px;
        font-family: Arial, sans-serif;
        padding:0px 32px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 72px;
        box-sizing: border-box;
      }
      .nav-logo {
        font-size: 24px;
        margin-right: auto;
      }
      .logo {
        width: 128px;
        height: 85px;
        object-fit: cover;
      }
      .first {
        color: #4da6ff;
        font-weight: bold;
        text-decoration: none;
        text-align: right;
        margin:2px 15px;
      }
      .content {
        padding: 16px;
      }
      h1 {
        color: #4da6ff;
        margin: 10px;
      }
      p {
        color: #ccc;           
      }
      audio {
        max-width: 512px;
        width: 80%;
        transform-origin: left;
        padding: 8px;
      }
      .footer {
        display: flex;
        justify-content: center;
        color: #666;
        margin-top: 50px;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="nav-logo">
        <img src="https://www.webmaster-tipps.de/wp-content/uploads/html5-einsteigerguide.png" class="logo">
      </div>
      <a href="index.html" style="margin 0px 15px" class="first">Home</a>
    </nav>
    <div class="content">
      <h1>Music</h1>
      <h2>DJ Damon</h2>
      <audio controls loop controlslist="undownload" oncontextmenu="return false">
        <source src="a1.mp3" type="audio/mpeg">
      </audio>
      <h2>Radwimps sparkle</h2>
      <audio controls loop controlslist="undownload" oncontextmenu="return false">
        <source src="a2.mp3" type="audio/mpeg">
      </audio>
      <div class="footer">© 2026 Rezzaw</div>
    </div>
  </body>
</html>
