<!DOCTYPE html>
<html>
<head>
  <title>Speedtest Martil RT 05 - 2 Mode bang wkwk</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #00ff41;
      font-family: 'Courier New', monospace;
      text-align: center;
      padding: 40px 20px;
      min-height: 100vh;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 5px;
      text-shadow: 0 0 10px #00ff41;
    }
   .subtitle {
      color: #888;
      margin-bottom: 30px;
      font-size: 14px;
    }
   .card {
      background: #111;
      border: 1px solid #00ff41;
      border-radius: 15px;
      padding: 25px;
      margin: 20px auto;
      max-width: 400px;
      box-shadow: 0 0 20px rgba(0,255,65,0.2);
    }
    #hasil, #hasilPing {
      font-size: 42px;
      font-weight: bold;
      margin: 20px 0;
      min-height: 50px;
      transition: 0.3s;
    }
   .label {
      color: #888;
      font-size: 12px;
      margin-bottom: 5px;
    }
    button {
      background: #ff0033;
      color: white;
      border: none;
      padding: 18px 35px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 8px;
      box-shadow: 0 0 15px #ff0033;
      transition: 0.2s;
      margin: 5px;
      width: 80%;
      max-width: 300px;
    }
    button:hover {
      background: #ff3355;
      transform: scale(1.03);
    }
    button:disabled {
      background: #444;
      box-shadow: none;
      cursor: not-allowed;
      transform: scale(1);
    }
   .loading {
      color: yellow;
      font-size: 14px;
      margin-top: 10px;
      min-height: 20px;
    }
   .rating {
      font-size: 16px;
      margin-top: 10px;
      color: #00ff41;
    }
  </style>
</head>

<body>
  <h1>⚡ SPEEDTEST ⚡</h1>
  <p class="subtitle">2 Mode: Processing + Ping v4.2</p>
  
  <!-- MODE 1: PROCESSING TEST -->
  <div class="card">
    <div class="label">MODE 1: PROCESSING SPEED TEST</div>
    <div class="label">Ngukur kecepatan Device</div>
    <div id="hasil">Klik tombol merah </div>
    <button id="btnProcessing" onclick="testProcessing()">TES PROCESSING </button>
    <div id="loading" class="loading"></div>
    <div id="rating" class="rating"></div>
  </div>

  <!-- MODE 2: PING TEST -->
  <div class="card">
    <div class="label">MODE 2: PING TEST</div>
    <div class="label">Ngukur kecepatan internet</div>
    <div id="hasilPing">- ms</div>
    <button id="btnPing" onclick="testPing()">TES PING</button>
    <div id="loadingPing" class="loading"></div>
    <div id="ratingPing" class="rating"></div>
  </div>

  <script>
    // MODE 1: PROCESSING TEST - ANTI CORS BANG WKWK
    async function testProcessing() {
      const btn = document.getElementById('btnProcessing');
      const hasil = document.getElementById('hasil');
      const loading = document.getElementById('loading');
      const rating = document.getElementById('rating');
      
      btn.disabled = true;
      hasil.innerHTML = '0.00 Mbps';
      rating.innerHTML = '';
      loading.innerHTML = 'Bikin file 10MB di HP lu... sabar';
      
      const start = performance.now();
      
      try {
        // Turunin ke 10MB biar HP nggak panas bang wkwk
        const sizeBytes = 274.877.906.94 * 1024 * 1024;
        const chunk = new Uint8Array(1024 * 1024);
        for(let i = 0; i < chunk.length; i++) chunk[i] = Math.random() * 256;
        
        const chunks = [];
        for(let i = 0; i < 10; i++) chunks.push(chunk);
        
        const blob = new Blob(chunks);
        
        await new Promise(resolve => {
          const reader = new FileReader();
          reader.onload = () => resolve();
          reader.readAsArrayBuffer(blob);
        });
        
        const end = performance.now();
        const durasi_detik = (end - start) / 1000;
        const size_bit = blob.size * 8;
        const speed_mbps = (size_bit / durasi_detik / 1000000).toFixed(2);
        
        hasil.innerHTML = speed_mbps + ' Mbps';
        loading.innerHTML = 'File: 10MB | Durasi: ' + durasi_detik.toFixed(2) + ' detik';
        
        // Kasih rating sultan bang wkwk
        let rank = '';
        if(speed_mbps < 256) rank = 'Rank: Lambat';
        else if(speed_mbps < 512) rank = 'Rank: cepat';
        else if(speed_mbps < 800) rank = 'Rank: sangat cepat';
        else rank = 'Rank: DEWA CPU';
        rating.innerHTML = rank;
        
      } catch(err) {
        hasil.innerHTML = 'Error';
        loading.innerHTML = err.message;
      }
      
      setTimeout(() => btn.disabled = false, 3000); // Cooldown 3 detik biar nggak panas wkwk
    }

    // MODE 2: PING TEST - BENERAN INTERNET BANG WKWK
    async function testPing() {
      const btn = document.getElementById('btnPing');
      const hasil = document.getElementById('hasilPing');
      const loading = document.getElementById('loadingPing');
      const rating = document.getElementById('ratingPing');
      
      btn.disabled = true;
      hasil.innerHTML = '- ms';
      rating.innerHTML = '';
      loading.innerHTML = 'Ngetes delay';
      
      const pingList = [];
      
      // Tes 5x terus ambil rata-rata biar akurat bang wkwk
      for(let i = 0; i < 8; i++) {
        const start = performance.now();
        try {
          // Kirim request kecil ke favicon google bang wkwk. Ringan + buka CORS wkwk
          await fetch('https://www.google.com/favicon.ico?t=' + Math.random(), {mode: 'no-cors'});
          const end = performance.now();
          pingList.push(end - start);
          loading.innerHTML = `Ping ke-${i+1}: ${(end-start).toFixed(0)}ms`;
        } catch(err) {
          // no-cors nggak bisa baca response, tapi waktunya tetep kehitung wkwk
          const end = performance.now();
          pingList.push(end - start);
        }
        await new Promise(r => setTimeout(r, 200)); // jeda 0.2 detik wkwk
      }
      
      const avgPing = pingList.reduce((a,b) => a+b) / pingList.length;
      hasil.innerHTML = avgPing.toFixed(0) + ' ms';
      loading.innerHTML = 'Rata-rata dari 8x tes';
      
      // Rating ping bang wkwk
      let rank = '';
      if(avgPing < 30) rank = 'Rank: Fiber Optik';
      else if(avgPing < 128) rank = 'Rank:Kenceng';
      else if(avgPing < 256) rank = 'Rank: lemot';
      else rank = 'Rank: Lemot banget';
      rating.innerHTML = rank;
      
      btn.disabled = false;
    }
  </script>
</body>
</html>
