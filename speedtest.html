<!DOCTYPE html>
<html>
<head>
  <title>Speedtest Martil RT 05 - GitHub Edition bang wkwk</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #00ff41;
      font-family: 'Courier New', monospace;
      text-align: center;
      padding: 50px 20px;
      min-height: 100vh;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #00ff41;
    }
    #hasil {
      font-size: 48px;
      font-weight: bold;
      margin: 40px 0;
      min-height: 60px;
    }
    button {
      background: #ff0033;
      color: white;
      border: none;
      padding: 25px 50px;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 10px;
      box-shadow: 0 0 20px #ff0033;
      transition: 0.2s;
    }
    button:hover {
      background: #ff3355;
      transform: scale(1.05);
    }
    button:disabled {
      background: #444;
      cursor: not-allowed;
    }
    .loading {
      color: yellow;
      font-size: 18px;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <h1>⚡ SPEEDTEST GITHUB SULTAN ⚡</h1>
  <p>100% JS Murni - No PHP bang wkwk wkwk</p>
  
  <div id="hasil">Klik tombol merah bang wkwk</div>
  
  <button id="btn" onclick="testSpeed()">TES SPEED BANG WKWK</button>
  <div id="loading" class="loading"></div>

  <script>
    async function testSpeed() {
      const btn = document.getElementById('btn');
      const hasil = document.getElementById('hasil');
      const loading = document.getElementById('loading');
      
      btn.disabled = true;
      hasil.innerHTML = '0.00 Mbps';
      loading.innerHTML = 'Ngedownload file 100MB... sabar bang wkwk 🗿';
      
      const start = performance.now();
      const cache_buster = '?t=' + Math.random();
      
      try {
        const response = await fetch('https://cdn.jsdelivr.net/gh/librespeed/speedtest@master/garbage.php?ck=' + Math.random());
        const blob = await response.blob();
        
        const end = performance.now();
        const durasi_detik = (end - start) / 1000;
        const size_bit = blob.size * 8;
        const speed_mbps = (size_bit / durasi_detik / 1000000).toFixed(2);
        
        hasil.innerHTML = speed_mbps + ' Mbps wkwk wkwk 🔥';
        loading.innerHTML = 'Selesai bang wkwk. Durasi: ' + durasi_detik.toFixed(2) + ' detik';
      } catch(err) {
        hasil.innerHTML = 'Error bang wkwk 💀';
        loading.innerHTML = 'Cek internet / CORS diblok bang wkwk';
      }
      
      btn.disabled = false;
    }
  </script>
</body>
</html>
